name: CI

on:
  pull_request:

jobs:
  check-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + all branches so origin/main is present: skill-lint and demo-lint
          # diff against trunk to scope their checks to what this branch changed, and the
          # default shallow checkout has no trunk ref to diff against.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run fast checks
        run: npm run check:fast

  check-slow:
    needs: [check-fast]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + all branches so origin/main is present: skill-lint and demo-lint
          # diff against trunk to scope their checks to what this branch changed, and the
          # default shallow checkout has no trunk ref to diff against.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run slow checks
        run: npm run check:slow
