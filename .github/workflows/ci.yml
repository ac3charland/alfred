name: CI

on:
  pull_request:

jobs:
  check-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run fast checks
        run: npm run check:fast

  check-slow:
    needs: [check-fast]
    # Run on an arm64 runner inside the SAME pinned Playwright image the Mac renders in, so
    # image snapshots are byte-identical everywhere (same arch, same Chromium, same fonts).
    # The image already bundles the browsers + Noble font stack, so no `playwright install`.
    runs-on: ubuntu-24.04-arm
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      # Chromium needs a real /dev/shm or it crashes mid-render.
      options: --ipc=host
    env:
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Already inside the canonical image, so call the in-container runner directly (the
      # `test:storybook` wrapper would try to launch Docker again). frontend is the only
      # package with slow checks.
      - name: Run slow checks
        run: npm run check:slow:linux -w frontend
