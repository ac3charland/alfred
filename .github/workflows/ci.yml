name: CI

on:
  pull_request:

jobs:
  check-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + all branches so origin/main is present: skill-lint and demo-lint
          # diff against trunk to scope their checks to what this branch changed, and the
          # default shallow checkout has no trunk ref to diff against.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run fast checks
        run: npm run check:fast

  check-slow:
    needs: [check-fast]
    # arm64 runner so the snapshot render (inside the pinned Playwright image, via the
    # `test:storybook` Docker wrapper) is the same arch as the committed baselines — no QEMU
    # emulation. The check command stays the full-scope root `npm run check:slow`; the wrapper
    # just launches Docker on the runner host.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + all branches so origin/main is present: skill-lint and demo-lint
          # diff against trunk to scope their checks to what this branch changed, and the
          # default shallow checkout has no trunk ref to diff against.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      # The database/ integration suite (check:slow) spins up a throwaway PostgreSQL
      # cluster from the server binaries, so make sure they're installed on the runner.
      - name: Ensure PostgreSQL server binaries
        run: |
          if ! command -v initdb >/dev/null 2>&1 && ! ls /usr/lib/postgresql/*/bin/initdb >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y postgresql
          fi

      - name: Run slow checks
        run: npm run check:slow
