name = "alfred-workers"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ── Routes (code-module §13.1) ────────────────────────────────────────────────
# The Worker serves two paths from its one entrypoint (routed in src/index.ts):
#   GET  /                → health check ("alfred workers ok")
#   POST /github/webhook  → the GitHub PR webhook ingress (HMAC-verified)
# On the default *.workers.dev domain no `routes` block is needed — the path is
# matched in code. Add a `routes`/`route` entry here only when fronting it with a
# custom domain.

# ── Secrets (set with `wrangler secret put <NAME>`, never committed; §13.4/§19.1) ─
# These back the typed `Env` in src/index.ts. For local `wrangler dev`, put the
# same keys in a gitignored `.dev.vars` file (dotenv format).
#   GITHUB_WEBHOOK_SECRET     — shared HMAC secret; must match each repo's webhook config.
#   GITHUB_TOKEN              — fine-grained PAT, Contents:read on the project repos (spec snapshot).
#   SUPABASE_URL              — the project's Supabase URL (e.g. https://<ref>.supabase.co).
#   SUPABASE_SERVICE_ROLE_KEY — service-role key; bypasses RLS for the trusted webhook write.
